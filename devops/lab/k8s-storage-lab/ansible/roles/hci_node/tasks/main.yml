# BeeGFS DKMS 빌드에 필요 — inject_facts_as_vars=False이므로 ansible_facts['kernel'] 사용
- name: Install kernel headers for BeeGFS DKMS
  ansible.builtin.apt:
    name: "linux-headers-{{ ansible_facts['kernel'] }}"
    state: present
    update_cache: no
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install HCI node extra packages
  ansible.builtin.apt:
    name: "{{ extra_packages }}"
    state: present
    update_cache: yes
  retries: 3
  delay: 5
  register: apt_result
  until: apt_result is succeeded

- name: Enable chrony time sync
  ansible.builtin.systemd:
    name: chrony
    enabled: yes
    state: started

- name: Register Ceph kernel modules in modules-load.d
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/k8s.conf
    line: "{{ item }}"
  loop: "{{ ceph_modules }}"

- name: Load Ceph kernel modules immediately
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ ceph_modules }}"
  ignore_errors: yes
