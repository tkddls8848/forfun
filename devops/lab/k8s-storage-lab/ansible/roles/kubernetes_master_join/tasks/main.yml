---
- name: Check if already joined as control-plane
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_admin_conf

# Derive node name from ec2 tag
- name: Determine master node name from EC2 tag
  ansible.builtin.set_fact:
    master_node_name: >-
      {{ hostvars[inventory_hostname]['ec2_tags']['Name']
         | regex_replace(project_name + '-', '') }}

- name: Set master hostname
  hostname:
    name: "{{ master_node_name }}"
  when: not k8s_admin_conf.stat.exists

# Read control-plane join command saved by master-1
- name: Read control-plane join command from local file
  become: false
  ansible.builtin.set_fact:
    cp_join_cmd: "{{ lookup('file', '/tmp/cp-join-command') }}"
  when: not k8s_admin_conf.stat.exists

- name: Join as control-plane node (master-2/3)
  ansible.builtin.command: >
    {{ cp_join_cmd }}
    --node-name {{ master_node_name }}
  when: not k8s_admin_conf.stat.exists
  changed_when: true

- name: Create .kube directory
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu

- name: Copy admin.conf to user kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu

# master-1의 kubernetes_master role과 동일하게 manifests 배포 (HA: master-2/3도 보유)
- name: manifests 디렉토리 생성
  ansible.builtin.file:
    path: /home/ubuntu/manifests
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: manifests 복사 (bastion → master-2/3)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../manifests/"
    dest: /home/ubuntu/manifests/
    owner: ubuntu
    group: ubuntu
    mode: '0644'
