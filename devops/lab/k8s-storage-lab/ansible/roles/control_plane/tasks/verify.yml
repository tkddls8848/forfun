# Patch kube-proxy to nftables mode if not already set
- name: Verify and patch kube-proxy to nftables mode
  ansible.builtin.shell: |
    MODE=$(kubectl -n kube-system get configmap kube-proxy \
      -o jsonpath='{.data.config\.conf}' \
      | grep '^mode:' | awk '{print $2}' | tr -d '"')
    if [ "$MODE" != "nftables" ]; then
      kubectl -n kube-system get configmap kube-proxy -o yaml \
        | sed 's/mode: ""/mode: "nftables"/' \
        | kubectl apply -f -
    fi
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true
