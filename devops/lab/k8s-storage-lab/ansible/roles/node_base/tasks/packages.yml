---
- name: Wait for cloud-init to complete
  ansible.builtin.command: cloud-init status --wait
  changed_when: false
  failed_when: false

- name: Disable unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: stopped
    enabled: no
  failed_when: false

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - git
      - nfs-common
      - open-iscsi
      - python3
      - python3.12
      - conntrack
      - socat
      - nftables
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

# Ubuntu 24.04 default is nftables — compatible with K8s, no switch needed
# Enable nftables service as pre-requisite for kube-proxy nftables mode
- name: Enable nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: yes
    state: started
