---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-beegfs
spec:
  accessModes: [ReadWriteMany]
  storageClassName: beegfs-scratch
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: verify-test-beegfs
spec:
  containers:
    - name: test
      image: busybox
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /mnt/data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: test-beegfs
