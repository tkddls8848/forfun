# PVC: Ceph File (CephFS) — ReadWriteMany
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-test-cephfs
  namespace: storage-test
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ceph-cephfs
  resources:
    requests:
      storage: 1Gi
---
# PVC: Ceph Block (RBD) — ReadWriteOnce (단일 파드에서만 사용)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-test-rbd
  namespace: storage-test
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 1Gi
---
# PVC: BeeGFS — ReadWriteMany
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-test-beegfs
  namespace: storage-test
spec:
  accessModes: [ReadWriteMany]
  storageClassName: beegfs-scratch
  resources:
    requests:
      storage: 1Gi
