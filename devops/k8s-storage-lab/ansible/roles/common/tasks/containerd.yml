- name: Register Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
    | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker

- name: Install containerd.io
  apt:
    name: containerd.io
    state: present
    update_cache: yes

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  changed_when: true
  notify: restart containerd

- name: Enable SystemdCgroup in containerd config
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

# Set pause image version matching K8s 1.31
- name: Set sandbox_image pause version (K8s 1.31)
  replace:
    path: /etc/containerd/config.toml
    regexp: 'sandbox_image = "registry.k8s.io/pause:.*"'
    replace: 'sandbox_image = "registry.k8s.io/pause:3.10"'
  notify: restart containerd

- name: Flush handlers to apply containerd config immediately
  meta: flush_handlers

- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: yes
    state: started
