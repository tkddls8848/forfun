- name: cloud-init 완료 대기
  command: cloud-init status --wait
  changed_when: false
  failed_when: false

- name: cloud-init package 단계 완료 확인
  shell: cloud-init status | grep -E "done|error|disabled"
  register: cloud_init_status
  until: cloud_init_status.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  failed_when: false

- name: unattended-upgrades 비활성화
  systemd:
    name: unattended-upgrades
    state: stopped
    enabled: no
  failed_when: false

- name: 공통 패키지 설치
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - jq
      - apt-transport-https
      - ca-certificates
      - gnupg
      - nfs-common
      - open-iscsi
      - python3
      - python3-pip
      - net-tools
      - iputils-ping
      - conntrack
      - ethtool
      - socat
      - bash-completion
    state: present
    update_cache: yes
    lock_timeout: 300
  environment:
    DEBIAN_FRONTEND: noninteractive