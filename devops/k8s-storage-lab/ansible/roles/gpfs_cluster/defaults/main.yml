---
gpfs_cluster_name: "gpfslab"
gpfs_fs_name: "gpfs0"
gpfs_mount_point: "/gpfs/gpfs0"
gpfs_block_size: "256K"
gpfs_data_replicas: 2
gpfs_metadata_replicas: 2
gpfs_primary_server: "nsd-1"
gpfs_secondary_server: "nsd-2"
# EBS /dev/xvdb → Nitro 인스턴스에서 /dev/nvme1n1 로 노출
gpfs_nsd_device: "/dev/nvme1n1"
# mmchlicense client 대상 (master + 모든 worker 콤마 구분)
gpfs_client_nodes: >-
  master-1{% for h in groups['worker'] %},{{ hostvars[h].ec2_tags.Name | regex_replace('k8s-storage-lab-', '') }}{% endfor %}
