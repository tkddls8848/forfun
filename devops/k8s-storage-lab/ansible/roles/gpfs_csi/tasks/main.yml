---
# ── GUI 초기화 (nsd-1에서 실행) ──────────────────────────────────
- name: GUI DB 초기화
  command: /usr/lpp/mmfs/gui/bin/initdb
  failed_when: false
  run_once: true
  delegate_to: "{{ gpfs_gui_host }}"

- name: GUI 서비스 시작
  shell: |
    systemctl enable --now gpfsgui 2>/dev/null || \
    /usr/lpp/mmfs/gui/bin/guiserver start || true
  run_once: true
  delegate_to: "{{ gpfs_gui_host }}"

- name: GUI 기동 대기 (30초)
  wait_for:
    host: "{{ hostvars[gpfs_gui_host].ansible_host }}"
    port: 443
    timeout: 60
  run_once: true
  delegate_to: localhost
  become: false

- name: GUI admin 사용자 생성
  shell: |
    /usr/lpp/mmfs/bin/mmguiuser create \
      --username {{ gpfs_gui_user }} \
      --password {{ gpfs_gui_password }} \
      --role Administrator || true
  run_once: true
  delegate_to: "{{ gpfs_gui_host }}"

# ── CSI Operator 설치 (master에서 실행) ──────────────────────────
- name: IBM Spectrum Scale CSI Helm repo 추가
  command: >
    helm repo add ibm-spectrum-scale
    https://raw.githubusercontent.com/IBM/ibm-spectrum-scale-csi/master/stable/ibm-spectrum-scale-csi-operator
  register: repo_add
  changed_when: "'already exists' not in repo_add.stderr"
  failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stderr
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Helm repo 업데이트
  command: helm repo update
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: CSI 네임스페이스 생성
  shell: kubectl create namespace ibm-spectrum-scale-csi-driver --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: GUI 인증 Secret 생성
  shell: |
    kubectl create secret generic scale-secret \
      -n ibm-spectrum-scale-csi-driver \
      --from-literal=username={{ gpfs_gui_user }} \
      --from-literal=password={{ gpfs_gui_password }} \
      --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: CSI values.yaml 생성
  template:
    src: scale-csi-values.yaml.j2
    dest: /tmp/scale-csi-values.yaml
    mode: '0644'

- name: CSI Operator 설치 여부 확인
  command: helm status ibm-spectrum-scale-csi-operator -n ibm-spectrum-scale-csi-driver
  register: csi_check
  failed_when: false
  changed_when: false
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: CSI Operator Helm 설치
  shell: |
    helm upgrade --install ibm-spectrum-scale-csi-operator \
      ibm-spectrum-scale/ibm-spectrum-scale-csi-operator \
      -n ibm-spectrum-scale-csi-driver \
      -f /tmp/scale-csi-values.yaml \
      --timeout 5m
  when: csi_check.rc != 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: CSI Operator Pod 대기
  command: >
    kubectl wait --for=condition=ready pod
    -l app.kubernetes.io/name=ibm-spectrum-scale-csi-operator
    -n ibm-spectrum-scale-csi-driver
    --timeout=180s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

# ── StorageClass 생성 ─────────────────────────────────────────────
- name: GPFS StorageClass 생성
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: gpfs-scale
    provisioner: spectrumscale.csi.ibm.com
    parameters:
      volBackendFs: "{{ gpfs_fs_name }}"
      clusterId:    "{{ gpfs_cluster_name }}"
    reclaimPolicy: Delete
    allowVolumeExpansion: true
    EOF
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: StorageClass 확인 출력
  command: kubectl get storageclass gpfs-scale
  register: sc_info
  changed_when: false
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: GPFS CSI 설치 완료 출력
  debug:
    msg:
      - "GPFS CSI 설치 완료"
      - "StorageClass : gpfs-scale"
      - "GUI          : https://{{ hostvars[gpfs_gui_host].ansible_host }} ({{ gpfs_gui_user }} / {{ gpfs_gui_password }})"
