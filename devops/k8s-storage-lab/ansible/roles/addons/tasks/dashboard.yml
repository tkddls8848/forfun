---
- name: kubernetes-dashboard 설치 여부 확인
  command: kubectl get deployment kubernetes-dashboard -n kubernetes-dashboard
  register: dashboard_check
  failed_when: false
  changed_when: false
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: kubernetes-dashboard 설치 (v2.7.0 manifest)
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml
  when: dashboard_check.rc != 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Dashboard 서비스 NodePort 패치
  shell: |
    kubectl patch svc kubernetes-dashboard -n kubernetes-dashboard \
      -p '{"spec":{"type":"NodePort","ports":[{"port":443,"targetPort":8443,"nodePort":{{ dashboard_nodeport }}}]}}'
  when: dashboard_check.rc != 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Dashboard admin ServiceAccount 생성
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: admin-user
      namespace: kubernetes-dashboard
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: admin-user
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
    - kind: ServiceAccount
      name: admin-user
      namespace: kubernetes-dashboard
    EOF
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Dashboard rollout 대기
  command: >
    kubectl rollout status deployment/kubernetes-dashboard
    -n kubernetes-dashboard --timeout=180s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Dashboard 접속 토큰 생성
  command: kubectl create token admin-user -n kubernetes-dashboard --duration=8760h
  register: dashboard_token
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Dashboard 접속 정보 출력
  debug:
    msg:
      - "Dashboard URL : https://<worker-IP>:{{ dashboard_nodeport }}"
      - "Token         : {{ dashboard_token.stdout }}"
