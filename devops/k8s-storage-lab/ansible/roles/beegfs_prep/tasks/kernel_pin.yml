---
# ── Worker: 커널 버전 확인 및 6.8 고정 ────────────────────────────────────────
# BeeGFS 7.4.6은 커널 6.11까지만 지원. 6.12 이상 커널에서는 클라이언트 모듈 빌드 실패.
# AWS Ubuntu 24.04가 커널 6.17을 기본 탑재하므로 워커 노드에서 6.8로 다운그레이드 필요.

- name: Get current kernel major.minor (worker)
  set_fact:
    _kernel_mm: "{{ ansible_facts['kernel'] | regex_replace('^(\\d+\\.\\d+).*', '\\1') }}"
  when: "'worker' in group_names"

- name: Pin kernel to 6.8 if current kernel >= 6.12 (worker)
  when:
    - "'worker' in group_names"
    - _kernel_mm is version('6.12', '>=')
  block:
    - name: Update APT cache for kernel search
      apt:
        update_cache: yes
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Install kernel 6.8 image and headers
      shell: |
        IMG=$(apt-cache search 'linux-image-6\.8.*-aws' \
              | awk '{print $1}' | sort -V | tail -1)
        HDR=$(apt-cache search 'linux-headers-6\.8.*-aws' \
              | awk '{print $1}' | sort -V | tail -1)
        [ -z "$IMG" ] && { echo "ERROR: linux-image-6.8.*-aws 패키지 없음"; exit 1; }
        DEBIAN_FRONTEND=noninteractive apt-get install -y "$IMG" "$HDR"
      changed_when: true

    - name: Get exact 6.8 kernel version string
      shell: |
        dpkg -l | grep 'linux-image-6\.8.*-aws' \
          | awk '{print $2}' | sed 's/linux-image-//' | sort -V | tail -1
      register: _kernel_68_ver
      changed_when: false

    - name: Set GRUB default to 6.8 kernel
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_DEFAULT='
        line: 'GRUB_DEFAULT="Advanced options for Ubuntu>Ubuntu, with Linux {{ _kernel_68_ver.stdout }}"'

    - name: Update GRUB
      command: update-grub
      changed_when: true

    - name: Hold current high kernel to prevent re-upgrade
      shell: |
        apt-mark hold \
          linux-image-{{ ansible_facts['kernel'] }} \
          linux-headers-{{ ansible_facts['kernel'] }} 2>/dev/null || true
      changed_when: false

    - name: Reboot into 6.8 kernel
      reboot:
        reboot_timeout: 300
        post_reboot_delay: 15

    - name: Refresh facts after reboot
      setup:
