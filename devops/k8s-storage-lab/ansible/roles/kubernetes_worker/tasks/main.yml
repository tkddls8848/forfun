- name: 이미 join 됐는지 확인
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

# 신규 join → ec2_tags 기반 worker-N 이름 사용
# 이미 join됨 → 현재 등록된 hostname 그대로 사용 (ip-10-0-1-xxx 또는 worker-N)
- name: K8s 등록 노드명 결정
  set_fact:
    worker_node_name: >-
      {{ hostvars[inventory_hostname]['ec2_tags']['Name'] | regex_replace('k8s-storage-lab-', '')
         if not kubelet_conf.stat.exists
         else ansible_facts['hostname'] }}

- name: Worker 호스트명 설정
  hostname:
    name: "{{ worker_node_name }}"
  when: not kubelet_conf.stat.exists

- name: worker join
  command: >
    {{ hostvars[groups['master'][0]].worker_join_command }}
    --node-name {{ worker_node_name }}
  when: not kubelet_conf.stat.exists

- name: worker 레이블
  command: kubectl label node {{ worker_node_name }} role=worker --overwrite
  delegate_to: "{{ groups['master'][0] }}"
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  ignore_errors: yes
