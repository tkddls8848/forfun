---
- name: 인스톨러 파일 존재 확인
  local_action:
    module: find
    paths: "{{ playbook_dir }}/../../gpfs-packages"
    patterns: "*-install"
  register: installer_files
  run_once: true

- name: 인스톨러 없으면 중단
  fail:
    msg: |
      gpfs-packages/ 에 설치 인스톨러가 없습니다.
      IBM Spectrum Scale Developer Edition을 다운로드 후
      gpfs-packages/ 디렉토리에 넣어주세요.
      다운로드: https://www.ibm.com/account/reg/us-en/signup?formid=urx-41728
  when: installer_files.files | length == 0
  run_once: true

- name: OS 의존 패키지 설치
  apt:
    name: "{{ gpfs_os_packages }}"
    state: present
    update_cache: yes
  retries: 3
  delay: 5

- name: 커널 헤더 설치
  apt:
    name: "linux-headers-{{ ansible_kernel }}"
    state: present

- name: /tmp/gpfs-packages 디렉토리 생성
  file:
    path: /tmp/gpfs-packages
    state: directory
    mode: '0755'

- name: 인스톨러 전송
  copy:
    src: "{{ installer_files.files[0].path }}"
    dest: /tmp/gpfs-packages/gpfs-installer
    mode: '0755'

- name: 인스톨러 실행하여 .deb 추출
  shell: |
    cd /tmp/gpfs-packages
    ./gpfs-installer --silent 2>/dev/null || \
    ./gpfs-installer -s 2>/dev/null || \
    ./gpfs-installer 2>/dev/null || true
  args:
    creates: /tmp/gpfs-packages/gpfs.base_*.deb

- name: 추출된 .deb 위치 탐색
  find:
    paths: /tmp/gpfs-packages
    patterns: "gpfs.base_*.deb"
    recurse: yes
  register: base_deb

- name: .deb 추출 실패 시 중단
  fail:
    msg: "인스톨러 실행 후 gpfs.base .deb 파일을 찾지 못했습니다. 인스톨러 출력을 확인하세요."
  when: base_deb.files | length == 0

- name: .deb 디렉토리 경로 설정
  set_fact:
    gpfs_deb_dir: "{{ base_deb.files[0].path | dirname }}"

- name: gpfs.base 설치
  shell: dpkg -i {{ gpfs_deb_dir }}/gpfs.base_*.deb
  args:
    creates: /usr/lpp/mmfs/bin/mmcrcluster

- name: gpfs.gpl 설치
  shell: dpkg -i {{ gpfs_deb_dir }}/gpfs.gpl_*.deb
  failed_when: false

- name: gpfs.adv 설치 (있을 경우)
  shell: dpkg -i {{ gpfs_deb_dir }}/gpfs.adv_*.deb
  failed_when: false

- name: gpfs.crypto 설치 (있을 경우)
  shell: dpkg -i {{ gpfs_deb_dir }}/gpfs.crypto_*.deb
  failed_when: false

- name: gpfs.ext 설치 (있을 경우)
  shell: dpkg -i {{ gpfs_deb_dir }}/gpfs.ext_*.deb
  failed_when: false

- name: gpfs.gui 설치 (NSD 노드만)
  shell: dpkg -i {{ gpfs_deb_dir }}/gpfs.gui_*.deb
  failed_when: false
  when: "'nsd' in group_names"

- name: 의존성 자동 해결
  shell: apt-get install -f -y

- name: GPL 모듈 빌드 (mmbuildgpl)
  shell: /usr/lpp/mmfs/bin/mmbuildgpl
  args:
    creates: /lib/modules/{{ ansible_kernel }}/extra/mmfs26.ko
