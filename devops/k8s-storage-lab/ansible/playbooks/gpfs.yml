---
# 사전 조건: gpfs-packages/ 에 IBM Spectrum Scale .deb 파일이 있어야 합니다.
# 다운로드: https://www.ibm.com/account/reg/us-en/signup?formid=urx-41728

- name: GPFS 패키지 설치 (전체 노드)
  hosts: master:worker:nsd
  become: yes
  roles:
    - gpfs_install

- name: GPFS 클러스터 구성 (nsd-1에서 실행)
  hosts: nsd
  become: yes
  run_once: true
  roles:
    - gpfs_cluster

- name: GPFS DaemonSet 배포 (K8s로 데몬 관리)
  hosts: master
  become: no
  tasks:
    - name: GPFS DaemonSet 배포
      command: kubectl apply -f /home/ubuntu/manifests/gpfs/gpfs-daemonset.yaml
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: GPFS DaemonSet 준비 대기 (최대 2분)
      command: >
        kubectl rollout status daemonset/gpfs-daemon
        -n gpfs-system --timeout=120s
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

- name: GPFS CSI 드라이버 설치 (master에서 실행)
  hosts: master
  become: no
  roles:
    - gpfs_csi
