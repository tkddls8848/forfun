---
- name: BeeGFS SSH 연결 대기
  hosts: master:worker
  gather_facts: false
  tasks:
    - name: SSH 연결 대기 (최대 5분)
      wait_for_connection:
        timeout: 300
        sleep: 5

- name: BeeGFS 패키지 설치 및 디스크 준비
  hosts: master:worker
  become: yes
  roles:
    - beegfs_prep

- name: BeeGFS K8s 매니페스트 적용
  hosts: master
  become: no
  tasks:
    - name: BeeGFS 네임스페이스 및 데몬 매니페스트 적용
      command: >
        kubectl apply -f {{ ansible_env.HOME }}/manifests/beegfs/
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config-k8s-storage-lab"

    - name: BeeGFS mgmtd 준비 완료 대기
      command: >
        kubectl rollout status deployment/beegfs-mgmtd
        -n beegfs-system --timeout=120s
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config-k8s-storage-lab"
      retries: 3
      delay: 10

    - name: BeeGFS meta 준비 완료 대기
      command: >
        kubectl rollout status deployment/beegfs-meta
        -n beegfs-system --timeout=120s
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config-k8s-storage-lab"
      retries: 3
      delay: 10

    - name: BeeGFS storaged DaemonSet 준비 완료 대기
      command: >
        kubectl rollout status daemonset/beegfs-storage
        -n beegfs-system --timeout=180s
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config-k8s-storage-lab"
      retries: 3
      delay: 10

    - name: BeeGFS Prometheus Exporter 준비 완료 대기
      command: >
        kubectl rollout status deployment/beegfs-exporter
        -n beegfs-system --timeout=120s
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config-k8s-storage-lab"
      retries: 3
      delay: 10
