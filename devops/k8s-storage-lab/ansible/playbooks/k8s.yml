---
- name: 노드 부팅 및 SSH 연결 대기
  hosts: master:worker:nsd
  gather_facts: false
  tasks:
    - name: SSH 연결 대기 (최대 5분)
      wait_for_connection:
        timeout: 300
        sleep: 5

- name: OS 기반 설정
  hosts: master:worker:nsd
  become: yes
  roles:
    - common

- name: Worker 추가 설정
  hosts: worker
  become: yes
  roles:
    - worker

- name: NSD 추가 설정 (GPFS 의존 패키지)
  hosts: nsd
  become: yes
  roles:
    - nsd

- name: 클러스터 공통 설정
  hosts: master:worker:nsd
  become: yes
  roles:
    - cluster_setup

- name: K8s 패키지 설치
  hosts: master:worker:nsd
  become: yes
  roles:
    - kubernetes_common

- name: Master 초기화
  hosts: master
  become: yes
  roles:
    - kubernetes_master

- name: CNI 설치 (Flannel)
  hosts: master
  become: no
  roles:
    - cni

- name: Worker join
  hosts: worker
  become: yes
  serial: 1
  roles:
    - kubernetes_worker

- name: "NSD join (taint: role=gpfs-nsd:NoSchedule)"
  hosts: nsd
  become: yes
  serial: 1
  roles:
    - kubernetes_nsd

- name: 클러스터 Addon 설치 (Metrics Server, Dashboard, Prometheus, Grafana)
  hosts: master
  become: no
  roles:
    - addons

- name: 배스천 /etc/hosts 및 SSH config 설정
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: 노드 /etc/hosts 등록
      lineinfile:
        path: /etc/hosts
        line: >-
          {{ hostvars[item]['ansible_host'] }}
          {{ hostvars[item]['ec2_tags']['Name'] | regex_replace('k8s-storage-lab-', '') }}
        state: present
      loop: "{{ groups['all'] }}"

    - name: SSH config 등록
      become: no
      blockinfile:
        path: /home/ubuntu/.ssh/config
        create: yes
        mode: '0600'
        marker: "# {mark} k8s-storage-lab"
        block: |
          {% for host in groups['all'] %}
          Host {{ hostvars[host]['ec2_tags']['Name'] | regex_replace('k8s-storage-lab-', '') }}
            HostName {{ hostvars[host]['ansible_host'] }}
            User ubuntu
            IdentityFile ~/.ssh/storage-lab.pem
            StrictHostKeyChecking no
          {% endfor %}
