---
# ── 0. Wait for SSH ──
- name: Wait for nodes to boot and accept SSH
  hosts: master:worker
  gather_facts: false
  tasks:
    - name: Wait for SSH connection (up to 5 min)
      wait_for_connection:
        timeout: 300
        sleep: 5

# ── 1. Bastion HAProxy setup (must exist before control-plane-endpoint is used) ──
- name: Configure HAProxy on Bastion
  hosts: localhost
  connection: local
  become: yes
  roles:
    - haproxy

# ── 2. OS base configuration ──
- name: OS base configuration
  hosts: master:worker
  become: yes
  roles:
    - node_base

# ── 3. HCI node extra setup (worker only) ──
- name: HCI node extra setup
  hosts: worker
  become: yes
  roles:
    - hci_node

# ── 4. Cluster-wide common setup ──
- name: Cluster-wide common setup
  hosts: master:worker
  become: yes
  roles:
    - cluster_setup

# ── 5. K8s package install ──
- name: Install K8s packages
  hosts: master:worker
  become: yes
  roles:
    - kubernetes_common

# ── 6. Master-1 init ──
- name: Master-1 kubeadm init
  hosts: master
  become: yes
  roles:
    - role: kubernetes_master
      when: >-
        hostvars[inventory_hostname]['ec2_tags']['Name']
        == project_name + '-master-1'

# ── 7. CNI install (master-1 only) ──
- name: Install CNI (Flannel)
  hosts: master
  become: no
  roles:
    - role: cni
      when: >-
        hostvars[inventory_hostname]['ec2_tags']['Name']
        == project_name + '-master-1'

# ── 8. Master-2/3 control-plane join ──
- name: Master-2/3 control-plane join
  hosts: master
  become: yes
  serial: 1
  roles:
    - role: kubernetes_master_join
      when: >-
        hostvars[inventory_hostname]['ec2_tags']['Name']
        != project_name + '-master-1'

# ── 9. Worker join ──
- name: Worker join
  hosts: worker
  become: yes
  serial: 1
  roles:
    - kubernetes_worker

# ── 10. Cluster addons (master-1 only) ──
- name: Install cluster addons
  hosts: master
  become: no
  roles:
    - role: addons
      when: >-
        hostvars[inventory_hostname]['ec2_tags']['Name']
        == project_name + '-master-1'

# ── 11. Bastion /etc/hosts and SSH config ──
- name: Configure Bastion /etc/hosts and SSH config
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Register nodes in /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: >-
          {{ hostvars[item]['ansible_host'] }}
          {{ hostvars[item]['ec2_tags']['Name'] | regex_replace('k8s-storage-lab-', '') }}
        state: present
      loop: "{{ groups['all'] }}"

    - name: Register SSH config entries
      become: no
      blockinfile:
        path: /home/ubuntu/.ssh/config
        create: yes
        mode: '0600'
        marker: "# {mark} k8s-storage-lab"
        block: |
          {% for host in groups['all'] %}
          Host {{ hostvars[host]['ec2_tags']['Name'] | regex_replace('k8s-storage-lab-', '') }}
            HostName {{ hostvars[host]['ansible_host'] }}
            User ubuntu
            IdentityFile ~/.ssh/storage-lab.pem
            StrictHostKeyChecking no
          {% endfor %}
