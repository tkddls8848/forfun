apiVersion: apps/v1
kind: Deployment
metadata:
  name: beegfs-meta
  namespace: beegfs-system
  labels:
    app: beegfs-meta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beegfs-meta
  template:
    metadata:
      labels:
        app: beegfs-meta
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      # mgmtd가 먼저 Running 상태여야 meta가 등록 가능
      initContainers:
        - name: wait-mgmtd
          image: ubuntu:24.04
          command:
            - /bin/bash
            - -c
            - |
              # ── 필수 패키지 확인: beegfs-meta + beegfs-utils 모두 설치됐는지 확인
              # (어느 control-plane 노드에 스케줄돼도 동작하도록 dpkg로 체크)
              INSTALLED=$(chroot /host dpkg -l beegfs-meta beegfs-utils 2>/dev/null | grep -c '^ii' || echo 0)
              if [ "$INSTALLED" -lt 2 ]; then
                echo "=== BeeGFS 패키지 설치 중 (installed: ${INSTALLED}/2) ==="
                chroot /host /bin/bash -c "apt-get update 2>&1 && apt-get install -y beegfs-meta beegfs-utils 2>&1" || {
                  echo "ERROR: 패키지 설치 실패 (exit $?)"
                  exit 1
                }
              fi

              # ── mgmtd 호스트/포트를 conf에서 동적으로 읽기 (하드코딩 제거)
              MGMTD_HOST=$(grep -E '^sysMgmtdHost' /host/etc/beegfs/beegfs-meta.conf | awk '{print $3}')
              MGMTD_PORT=$(grep -E '^connMgmtdPortTCP' /host/etc/beegfs/beegfs-meta.conf | awk '{print $3}')
              MGMTD_PORT=${MGMTD_PORT:-8008}

              # 컨테이너 내부 /etc/hosts ≠ 호스트 /etc/hosts 이므로
              # hostname → IP를 호스트의 /etc/hosts에서 직접 조회
              MGMTD_IP=$(awk -v h="$MGMTD_HOST" '!/^#/ && NF>=2 {for(i=2;i<=NF;i++) if($i==h){print $1; exit}}' /host/etc/hosts)
              MGMTD_IP=${MGMTD_IP:-$MGMTD_HOST}
              echo "mgmtd 연결 대기: ${MGMTD_HOST} → ${MGMTD_IP}:${MGMTD_PORT}"

              until (echo > /dev/tcp/${MGMTD_IP}/${MGMTD_PORT}) 2>/dev/null; do
                echo "mgmtd 대기 중..."; sleep 5
              done
              echo "mgmtd 응답 확인"
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
      containers:
        - name: beegfs-meta
          image: ubuntu:24.04
          command:
            - chroot
            - /host
            - /opt/beegfs/sbin/beegfs-meta
            - cfgFile=/etc/beegfs/beegfs-meta.conf
            - runDaemonized=false
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: host-root
          hostPath:
            path: /
