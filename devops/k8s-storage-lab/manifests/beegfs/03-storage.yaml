apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beegfs-storage
  namespace: beegfs-system
  labels:
    app: beegfs-storage
spec:
  selector:
    matchLabels:
      app: beegfs-storage
  template:
    metadata:
      labels:
        app: beegfs-storage
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        role: "worker"
      containers:
        - name: beegfs-storage
          image: ubuntu:24.04
          command:
            - /bin/bash
            - -c
            - |
              if [ ! -x /host/opt/beegfs/sbin/beegfs-storage ]; then
                echo "=== beegfs-storage not found — running apt-get on host ==="
                chroot /host /bin/bash -c "apt-get update 2>&1 && apt-get install -y beegfs-storage 2>&1" || {
                  echo "ERROR: apt-get install failed (exit $?)"
                  exit 1
                }
              fi
              exec chroot /host /opt/beegfs/sbin/beegfs-storage \
                cfgFile=/etc/beegfs/beegfs-storage.conf runDaemonized=false
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
            # /mnt/beegfs/storage는 별도 XFS 마운트이므로 명시적으로 주입
            - name: storage-data
              mountPath: /host/mnt/beegfs/storage
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: storage-data
          hostPath:
            path: /mnt/beegfs/storage
