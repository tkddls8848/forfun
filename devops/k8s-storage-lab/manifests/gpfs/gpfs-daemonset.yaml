---
apiVersion: v1
kind: Namespace
metadata:
  name: gpfs-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpfs-daemon
  namespace: gpfs-system
  labels:
    app: gpfs-daemon
spec:
  selector:
    matchLabels:
      app: gpfs-daemon
  template:
    metadata:
      labels:
        app: gpfs-daemon
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - key: "role"
          operator: "Equal"
          value: "gpfs-nsd"
          effect: "NoSchedule"
      nodeSelector:
        role: gpfs-nsd
      containers:
        - name: gpfs-daemon
          image: ubuntu:24.04
          securityContext:
            privileged: true
          command: ["/bin/bash", "-c"]
          args:
            - |
              MMFS=/host/usr/lpp/mmfs/bin

              # GPFS 데몬 시작 (이미 active면 skip)
              $MMFS/mmgetstate 2>/dev/null | grep -q active || $MMFS/mmstartup

              # active 상태 대기 (최대 90초)
              for i in $(seq 1 18); do
                $MMFS/mmgetstate 2>/dev/null | grep -q active && break
                echo "  [대기] GPFS active 대기 중... ($i/18)"
                sleep 5
              done

              # 파일시스템 마운트
              mkdir -p /gpfs/gpfs0
              $MMFS/mmmount gpfs0 -a 2>/dev/null || true

              echo "  ✅ GPFS 데몬 기동 완료"

              # 감시 루프 (30초 간격)
              while true; do
                sleep 30
                $MMFS/mmgetstate 2>/dev/null | grep -q active || {
                  echo "  ⚠️  GPFS 데몬 비정상 - 재시작"
                  $MMFS/mmstartup
                }
              done
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: gpfs-mount
              mountPath: /gpfs
              mountPropagation: Bidirectional
            - name: dev
              mountPath: /dev
      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: gpfs-mount
          hostPath:
            path: /gpfs
        - name: dev
          hostPath:
            path: /dev
