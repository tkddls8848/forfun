apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-pvc-beegfs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: beegfs-scratch
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-beegfs-writer
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "BeeGFS write test: $(date)" >> /mnt/data/test.txt
          cat /mnt/data/test.txt
          sleep 3600
      volumeMounts:
        - name: beegfs-vol
          mountPath: /mnt/data
  volumes:
    - name: beegfs-vol
      persistentVolumeClaim:
        claimName: test-pvc-beegfs
  restartPolicy: Never
