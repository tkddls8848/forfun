# vfirewall.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vfirewall
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vfirewall
  template:
    metadata:
      labels:
        app: vfirewall
    spec:
      containers:
      - name: opa
        image: openpolicyagent/opa:latest
        args:
        - "run"
        - "--server"
        - "--addr=0.0.0.0:8181"
        ports:
        - containerPort: 8181
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: vfirewall-svc
spec:
  selector:
    app: vfirewall
  ports:
  - port: 8181
    targetPort: 8181